<html class="dark" lang="tr"><head>

<style>
        body {
            background-color: #05070A;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(34, 211, 238, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(34, 211, 238, 0.03), transparent 25%);
        }
        
        .glass-panel {
            background: rgba(17, 20, 23, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(34, 211, 238, 0.15);
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .hud-bracket {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(34, 211, 238, 0.3);
        }
        .hud-bracket.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .hud-bracket.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .hud-bracket.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .hud-bracket.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .scanline {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-surface font-body h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Ambient Space Background Particles Simulation -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background-image: radial-gradient(1px 1px at 10% 20%, white, transparent), radial-gradient(1px 1px at 40% 60%, white, transparent), radial-gradient(1px 1px at 80% 30%, white, transparent), radial-gradient(1px 1px at 90% 80%, white, transparent), radial-gradient(2px 2px at 30% 90%, rgba(34, 211, 238, 0.5), transparent), radial-gradient(2px 2px at 70% 10%, rgba(34, 211, 238, 0.5), transparent);"></div>
<div class="absolute inset-0 z-0 scanline opacity-30"></div>
<main class="relative z-10 w-full max-w-lg px-6">
<!-- Main Login HUD Card -->
<div class="glass-panel relative rounded p-8 flex flex-col items-center text-center">
<!-- HUD Brackets -->
<div class="hud-bracket tl"></div>
<div class="hud-bracket tr"></div>
<div class="hud-bracket bl"></div>
<div class="hud-bracket br"></div>
<!-- Top Badge -->
<div class="flex items-center gap-2 mb-8 bg-surface-container-high px-4 py-1 rounded-sm border border-secondary/20 shadow-[0_0_15px_rgba(239,68,68,0.1)]">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-headline text-xs text-secondary font-bold tracking-widest uppercase">TÜRK UZAY KUVVETLERİ</span>
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<!-- ARF Emblem -->
<div class="relative mb-6">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl"></div>
<div class="w-32 h-32 rounded-full border-2 border-primary/40 bg-surface-container-lowest flex items-center justify-center relative z-10 shadow-[0_0_30px_rgba(34,211,238,0.2)]">
<div class="absolute inset-2 rounded-full border border-primary/20 border-dashed"></div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-5xl text-primary mb-1" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
<span class="font-headline text-3xl font-black text-primary tracking-widest">ARF</span>
</div>
</div>
<!-- Orbit Rings -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 rounded-full border border-primary/10 border-t-primary/30"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 rounded-full border border-primary/5 border-b-primary/20"></div>
</div>
<!-- Text Content -->
<h1 class="font-headline text-lg text-primary tracking-[0.1em] uppercase font-bold mb-3 shadow-primary">
                Uzay Gemisine Hoş Geldin, Pilot!
            </h1>
<p class="text-on-surface-variant text-sm mb-10 max-w-xs font-body">
                Matematik görevlerini tamamla, rütbe kazan, galaksiye hükmet.
            </p>
<!-- Action Area -->
<div class="w-full flex flex-col gap-4">
<button class="w-full bg-primary-container text-on-primary font-headline font-bold uppercase tracking-[0.1em] py-4 px-6 rounded-sm flex items-center justify-center gap-3 hover:shadow-[0_0_20px_rgba(34,211,238,0.4)] transition-all duration-300 relative overflow-hidden group">
<span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></span>
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">login</span>
<span>SİSTEME BAĞLAN</span>
</button>
</div>
<!-- Terminal Decorator -->
<div class="absolute bottom-0 left-0 w-full flex justify-between px-2 pb-1 opacity-40">
<span class="font-label text-[10px] text-primary tracking-widest">SYS.ONL</span>
<span class="font-label text-[10px] text-primary tracking-widest">V.1.0.4</span>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex gap-4 text-xs font-label tracking-widest text-outline uppercase">
<a class="hover:text-primary transition-colors" href="#">Gizlilik</a>
<span>|</span>
<a class="hover:text-primary transition-colors" href="#">Kullanım Koşulları</a>
</div>
<!-- Install Prompt Hint -->
<div class="flex items-center gap-2 bg-surface-container-highest/50 px-3 py-1.5 rounded-sm border border-outline-variant/30">
<span class="material-symbols-outlined text-[14px] text-primary">download</span>
<span class="text-[10px] font-label text-on-surface-variant uppercase tracking-widest">Ana Ekrana Ekle</span>
</div>
</div>
</main>
</body></html>
